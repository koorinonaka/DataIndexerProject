site_name: DataIndexer
site_description: >-
  DataIndexer is an Unreal Engine plugin for building structured,
  indexable game data assets with a dedicated editor workflow.
docs_dir: docs
site_dir: site

repo_name: DataIndexerProject
repo_url: https://github.com/koorinonaka/DataIndexerProject
edit_uri: ""

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: di-light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/tokens.css
  - assets/stylesheets/extra.css
  - assets/stylesheets/c-variant.css

extra_javascript:
  - assets/javascripts/toc-fix.js
  - assets/javascripts/quick-start-progress.js
  - assets/javascripts/overview-tabs.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Overview: 概要
            Getting Started: はじめに
            Quick Start: クイックスタート
            Core Concepts: コアコンセプト
            Repository: リポジトリ
            Schema: スキーマ
            Keys & Handles: キーとハンドル
            Indexes: インデックス
            Editor Guide: エディタガイド
            Asset Creation: アセット作成
            Data View: データビュー
            JSON Support: JSON サポート
            Driven Collection: ドリブンコレクション
            API Reference: API リファレンス
            Blueprint API: Blueprint API
            Function Library: 関数ライブラリ
            Custom K2 Nodes: カスタム K2 ノード
            C++ API: C++ API
            Repository API: リポジトリ API
            Schema API: スキーマ API
            Native Schema Interface: ネイティブスキーマインターフェース
            How-to Guides: How-to ガイド
            Migrate from DataTable: DataTable から移行する
            Repository Metadata: リポジトリメタデータ
            Parent Hierarchy: 親リポジトリ階層
            Changelog: 変更履歴
  - minify:
      minify_html: true

nav:
  - Overview: index.md
  - Getting Started: quick-start.md
  - Core Concepts:
    - concepts/index.md
    - Schema: concepts/schema.md
    - Repository: concepts/repository.md
    - Keys & Handles: concepts/keys-and-handles.md
    - Indexes: concepts/indexes.md
  - Editor Guide:
    - editor-guide/index.md
    - Asset Creation: editor-guide/asset-creation.md
    - Data View: editor-guide/data-view.md
    - JSON Support: editor-guide/json-support.md
    - Driven Collection: editor-guide/driven-collection.md
  - API Reference:
    - api-reference/index.md
    - Blueprint API:
      - Function Library: api-reference/function-library.md
      - Custom K2 Nodes: api-reference/k2-nodes.md
    - C++ API:
      - Repository API: api-reference/repository-api.md
      - Schema API: api-reference/schema-api.md
      - Native Schema Interface: api-reference/native-schema-interface.md
  - How-to Guides:
    - how-to/index.md
    - Migrate from DataTable: how-to/migrate-from-datatable.md
    - Repository Metadata: how-to/repository-metadata.md
    - Parent Hierarchy: how-to/parent-hierarchy.md
  - Changelog: changelog.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/koorinonaka/DataIndexerProject

copyright: Copyright &copy; 2026 Koorinonaka
